<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Piso WiFi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0f1e 0%, #1e293b 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 1rem;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1.75rem;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
    }
    .hero-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      background: rgba(56,189,248,0.1);
      border: 1px solid rgba(56,189,248,0.2);
      border-radius: 1.1rem;
      margin: 0 auto 1.25rem;
    }
    h1 { font-size: 1.4rem; color: #f1f5f9; font-weight: 800; margin-bottom: 0.25rem; }
    .sub { font-size: 0.82rem; color: #475569; margin-bottom: 2rem; }
    .field { margin-bottom: 1rem; text-align: left; }
    label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.78rem;
      color: #64748b;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.7rem;
      padding: 0.75rem 1rem;
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus {
      border-color: #38bdf8;
      background: rgba(56,189,248,0.05);
    }
    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      background: #38bdf8;
      color: #0a0f1e;
      font-weight: 700;
      font-size: 0.95rem;
      border: none;
      border-radius: 0.875rem;
      padding: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }
    button:hover { background: #7dd3fc; }
    button:active { transform: scale(0.98); }
    .error {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 0.65rem;
      color: #fca5a5;
      font-size: 0.83rem;
      padding: 0.65rem 1rem;
      margin-bottom: 1.25rem;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="hero-icon">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16" r="1" fill="#38bdf8" stroke="none"/>
      </svg>
    </div>

    <h1>Admin Panel</h1>
    <p class="sub">Piso WiFi Management</p>

    {% if error %}
    <div class="error">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          Username
        </label>
        <input type="text" name="username" placeholder="admin" autocomplete="off" required/>
      </div>
      <div class="field">
        <label>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Password
        </label>
        <input type="password" name="password" placeholder="••••••••" required/>
      </div>
      <button type="submit">
        Login
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
        </svg>
      </button>
    </form>
  </div>
</body>
</html>
